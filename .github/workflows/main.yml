name: Gerar EPG XML

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Rodar script EPG
        run: python main.py
      - name: Salvar o EPG no repositório
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add epg.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Atualizando EPG XML automatico" && git push)
